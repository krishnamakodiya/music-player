<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
  font-family: "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}


.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}


.heart {
  position: absolute;
  bottom: -15%;
  opacity: 0.22;
  animation-name: floatUp;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  filter: blur(0.3px);
}


@keyframes floatUp {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg) scale(0.9);
    opacity: 0;
  }
  15% {
    opacity: 0.3;
  }
  50% {
    transform: translateY(-60vh) translateX(40px) rotate(180deg) scale(1.15);
  }
  100% {
    transform: translateY(-130vh) translateX(-40px) rotate(360deg) scale(1.3);
    opacity: 0;
  }
}


.player {
  width: 360px;
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(18px);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.35);
  z-index: 1;
}

h1 {
  text-align: center;
  margin-bottom: 6px;
}

.now {
  text-align: center;
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 12px;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin: 16px 0;
}

.controls button {
  background: white;
  color: #ff5e8e;
  border: none;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

.controls button.active {
  background: #ff5e8e;
  color: white;
}

.playlist {
  max-height: 260px;
  overflow-y: auto;
}


.track {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  background: rgba(255,255,255,0.14);
  font-size: 14px;
}

.track.active {
  background: rgba(255,255,255,0.38);
  font-weight: 600;
}


.wave {
  display: none;
  gap: 2px;
}

.wave span {
  width: 3px;
  height: 10px;
  background: white;
  opacity: 0.8;
  animation: wave 1s infinite ease-in-out;
}

.wave span:nth-child(2) { animation-delay: 0.2s }
.wave span:nth-child(3) { animation-delay: 0.4s }

@keyframes wave {
  0%,100% { height: 6px }
  50% { height: 14px }
}

.track.active .wave {
  display: flex;
}

.track.paused .wave span {
  animation-play-state: paused;
}
</style>
</head>

<body>


<div class="hearts" id="hearts"></div>

<div class="player">
  <h1>💗 Your Playlist</h1>
  <div class="now" id="now">Tap a song</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button id="playBtn" onclick="togglePlay()">▶</button>
    <button onclick="next()">⏭</button>
    <button id="loopBtn" onclick="toggleLoop()">🔁</button>
  </div>

  <div class="playlist" id="playlist"></div>
</div>

<script>

const files = Array.from({ length: 33 }, (_, i) => `song${i+1}.mp3`);

const audio = document.getElementById("audio");
const playlist = document.getElementById("playlist");
const now = document.getElementById("now");
const playBtn = document.getElementById("playBtn");
const loopBtn = document.getElementById("loopBtn");

let index = 0;


files.forEach((name, i) => {
  const row = document.createElement("div");
  row.className = "track paused";
  row.innerHTML = `
    <div class="wave">
      <span></span><span></span><span></span>
    </div>
    <div>${name.replace(".mp3","")}</div>
  `;
  row.onclick = () => playTrack(i);
  playlist.appendChild(row);
});

function path(name) {
  return "music/" + name;
}


function playTrack(i) {
  index = i;
  audio.pause();
  audio.src = path(files[i]);
  audio.load();
  audio.play();
  updateUI();
}

function togglePlay() {
  if (!audio.src) playTrack(index);
  else audio.paused ? audio.play() : audio.pause();
}

function next() {
  playTrack((index + 1) % files.length);
}

function prev() {
  playTrack((index - 1 + files.length) % files.length);
}

function toggleLoop() {
  audio.loop = !audio.loop;
  loopBtn.classList.toggle("active", audio.loop);
}

audio.onplay = () => playBtn.innerText = "⏸";
audio.onpause = () => playBtn.innerText = "▶";
audio.onended = () => !audio.loop && next();

function updateUI() {
  now.innerText = "Now Playing: " + files[index];
  [...playlist.children].forEach((el, i) => {
    el.classList.toggle("active", i === index);
    el.classList.toggle("paused", audio.paused);
  });
}


const hearts = document.getElementById("hearts");
for (let i = 0; i < 25; i++) {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerText = "❤";
  h.style.left = Math.random() * 100 + "%";
  h.style.animationDuration = 10 + Math.random() * 10 + "s";
  h.style.fontSize = 14 + Math.random() * 10 + "px";
  hearts.appendChild(h);
}
</script>

</body>
</html>
